[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback (single page — route everything to index.html)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Never cache the service worker or manifest, so updates ship immediately
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
